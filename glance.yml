server:
  port: 8080
  proxied: true

theme:
  background-color: 0 30 8
  primary-color: 0 75 55
  contrast-multiplier: 1.1

pages:
  # ─── HOME ────────────────────────────────────────────────────────────────────
  - name: Home
    width: slim
    center-vertically: true
    columns:
      - size: full
        widgets:
          - type: search
            autofocus: true
            placeholder: "Search the matrix..."

          # All services in one centralised status box
          - type: monitor
            title: All Services
            cache: 1m
            sites:
              # Infrastructure
              - title: Proxmox
                url: "https://192.168.86.100:8006"
                icon: si:proxmox
              - title: Home Assistant
                url: "http://192.168.86.217:8123"
                icon: si:homeassistant
              - title: Nginx Proxy Manager
                url: "http://192.168.86.52:81"
                icon: si:nginx
              - title: Pi-hole
                url: "http://192.168.86.54/admin"
                icon: si:pihole
              - title: TwinGate
                url: "https://lavaughbrown1.twingate.com"
                icon: di:twingate
              # Media
              - title: Plex
                url: "http://192.168.86.200:32400/identity"
                icon: si:plex
              - title: qBittorrent
                url: "http://192.168.86.200:8080"
                icon: si:qbittorrent
              - title: Radarr
                url: "http://192.168.86.200:7878"
                icon: si:radarr
              - title: Sonarr
                url: "http://192.168.86.200:8989"
                icon: si:sonarr
              - title: Prowlarr
                url: "http://192.168.86.200:9696"
                icon: sh:prowlarr

          # Quick links
          - type: bookmarks
            groups:
              - title: Daily Drivers
                links:
                  - title: Gmail
                    url: https://mail.google.com/
                    icon: si:gmail
                  - title: YouTube
                    url: https://youtube.com
                    icon: si:youtube
                  - title: GitHub
                    url: https://github.com/Lavaughb
                    icon: si:github
                  - title: Reddit
                    url: https://www.reddit.com/
                    icon: si:reddit
              - title: AI Agents
                links:
                  - title: Gemini
                    url: https://gemini.google.com
                    icon: si:googlegemini
                  - title: Claude
                    url: https://claude.ai
                    icon: si:anthropic
                  - title: ChatGPT
                    url: https://chatgpt.com
                    icon: si:openai

  # ─── MEDIA ───────────────────────────────────────────────────────────────────
  - name: Media
    columns:
      # Left sidebar: service status + quick-launch links
      - size: small
        widgets:
          - type: monitor
            title: Media Services
            cache: 1m
            sites:
              - title: Plex
                url: "http://192.168.86.200:32400/identity"
                icon: si:plex
              - title: qBittorrent
                url: "http://192.168.86.200:8080"
                icon: si:qbittorrent
              - title: Radarr
                url: "http://192.168.86.200:7878"
                icon: si:radarr
              - title: Sonarr
                url: "http://192.168.86.200:8989"
                icon: si:sonarr
              - title: Prowlarr
                url: "http://192.168.86.200:9696"
                icon: sh:prowlarr

          - type: bookmarks
            groups:
              - title: Launch
                color: 0 75 55
                links:
                  - title: Plex
                    url: "http://192.168.86.200:32400/web"
                    icon: si:plex
                    description: Stream your library
                  - title: Radarr
                    url: "http://192.168.86.200:7878"
                    icon: si:radarr
                    description: Movie management
                  - title: Sonarr
                    url: "http://192.168.86.200:8989"
                    icon: si:sonarr
                    description: TV show management
                  - title: Prowlarr
                    url: "http://192.168.86.200:9696"
                    icon: sh:prowlarr
                    description: Indexer management
                  - title: qBittorrent
                    url: "http://192.168.86.200:8080"
                    icon: si:qbittorrent
                    description: Download client

      # Main content: trailers feed + movie/TV news
      - size: full
        widgets:
          # YouTube trailer channels — replace channel IDs with your own picks:
          #   Find a channel ID at: youtube.com/@ChannelName → About → Share → Copy channel ID
          - type: videos
            title: Trailers & Reviews
            style: grid-cards
            collapse-after: 6
            include-shorts: false
            channels:
              - UCi8e0iOVk1fEOogdfu4YgfA  # Movieclips Trailers
              - UCzWQYUVCpZqtN93H8RR44Qw  # Screen Junkies

          - type: rss
            title: Movie & TV News
            style: horizontal-cards
            limit: 12
            collapse-after: 6
            feeds:
              - url: https://www.reddit.com/r/movies.rss
                title: r/movies
                limit: 6
              - url: https://www.reddit.com/r/television.rss
                title: r/television
                limit: 6
